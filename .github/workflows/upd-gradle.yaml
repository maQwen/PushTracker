name: Update Gradle
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: [ubuntu-latest]
    env:
      GRADLE_OPTS: -Dorg.gradle.parallel=false

    steps:

      - name: Update Gradle Wrapper
        run: | 
           ./gradlew wrapper --gradle-version=8.14.4
           ./gradlew build        
