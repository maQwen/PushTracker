name: Test

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.parallel=false

    steps:

      - name: Test
        env:
          KEY: ${{ secrets.KEYSTORE_BASE64 }}
        if: {{ env.KEY == "" }} 
          run: echo "Empty"
        run: 
          echo "Key begin" > test.txt
          echo "$KEYSTORE_BASE64" >> test.txt
          echo "Key end" >> test.txt
          cat test.txt
          del test.txt
